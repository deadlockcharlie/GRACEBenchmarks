storage.backend=cql
storage.hostname=localhost
storage.cql.keyspace=janusgraph
storage.cql.replication-factor=1
storage.cql.read-consistency-level=ONE
storage.cql.write-consistency-level=ONE
storage.cql.local-datacenter=datacenter1
storage.cql.only-use-local-consistency-for-system-operations=true
storage.cql.read-timeout=5000
storage.cql.write-timeout=5000
storage.lock.wait-time=1
storage.lock.retries=0
storage.lock.clean-expired=false
storage.lock.local-mediator-group=tmp
storage.batch-loading=false
storage.parallel-backend-ops=true
storage.transactions=false
tx.log-tx=false
tx.max-commit-time=10000
ids.flush=false
ids.renew-timeout=60000
ids.block-size=10000
query.force-index=false
query.smart-limit=false
query.batch=true
query.fast-property=true
schema.default=none
cache.db-cache=true
cache.db-cache-time=300000
cache.db-cache-size=0.75
cache.db-cache-clean-wait=50
cache.tx-cache-size=50000
cache.tx-dirty-size=50000
graph.set-vertex-id=true
graph.set-edge-id=true
graph.allow-custom-vid-types=true
graph.allow-custom-eid-types=true
graph.tx-cache-size=50000

index.search.backend=elasticsearch
index.search.hostname=localhost:9200

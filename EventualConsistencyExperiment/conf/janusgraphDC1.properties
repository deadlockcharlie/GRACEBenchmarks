# JanusGraph Replica 1 Configuration - Connects to Scylla Node 1

gremlin.graph=org.janusgraph.core.JanusGraphFactory

# Connect to Scylla Node 1
storage.backend=cql
storage.hostname=scylla1,scylla2,scylla3

# Disable discovery to prevent connecting to other nodes
storage.cql.metadata-token-map-enabled=false
storage.cql.metadata-schema-enabled=false

storage.cql.keyspace=janusgraph
storage.cql.read-timeout=120000
storage.cql.write-timeout=120000
storage.cql.skip-schema-check=true
storage.cql.use-external-locking=true
storage.cql.partitioner-name=org.apache.cassandra.dht.Murmur3Partitioner

storage.cql.local-datacenter=dc1
#Replication strategy settings
# storage.cql.replication-strategy-class=org.apache.cassandra.locator.NetworkTopologyStrategy
storage.cql.replication-strategy-options=dc1,3,dc2,3

# Low consistency for maximum divergence
storage.cql.write-consistency-level=ONE
storage.cql.read-consistency-level=ONE


# Don't use locks for local operations
storage.lock.local-mediator-group=temp

# Enable cache for maximum divergence effect
cache.db-cache=false
cache.db-cache-clean-wait=0
cache.db-cache-time=0
cache.db-cache-size=0.5

query.batch.enabled=false

# Allow custom IDs to create conflicts
graph.set-vertex-id=true
graph.set-edge-id=true
graph.allow-custom-vid-types=true
graph.allow-custom-eid-types=true


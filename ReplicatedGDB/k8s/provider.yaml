apiVersion: apps/v1
kind: Deployment
metadata:
  name: yjs-provider
  labels:
    app: yjs-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yjs-provider
  template:
    metadata:
      labels:
        app: yjs-provider
    spec:
      containers:
      - name: yjs-provider
        image: yjs-provider:latest
        imagePullPolicy: Never  # Use local image for development
        ports:
        - containerPort: 1234
          name: websocket
        env:
        - name: PORT
          value: "1234"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 1234
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 1234
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: yjs-provider
  labels:
    app: yjs-provider
spec:
  type: ClusterIP
  ports:
  - port: 1234
    targetPort: 1234
    protocol: TCP
    name: websocket
  selector:
    app: yjs-provider

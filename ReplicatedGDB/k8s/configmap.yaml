apiVersion: v1
kind: ConfigMap
metadata:
  name: replicatedgdb-config
  labels:
    app: replicatedgdb
    datacenter: dc1
data:
  # Database selection: NEO4J, MEMGRAPH, JANUSGRAPH, ARANGODB, or MONGODB
  DATABASE: "MEMGRAPH"
  
  # Memgraph connection (sidecar container in same pod)
  DATABASE_URI: "bolt://localhost:7687"
  NEO4J_USER: ""
  NEO4J_PASSWORD: ""
  
  # Logging level: error, warn, info, debug
  LOG_LEVEL: "info"
  
  # WebSocket URI for Y.js synchronization
  # Points to the Y.js provider service deployed in the same namespace
  # Using short name since pods are in the same namespace
  WS_URI: "ws://yjs-provider:1234"
  
  # Data Center identifier (dc1, dc2, dc3, dc4, dc5, dc6)
  # Used for routing, metrics, and data locality decisions
  DC_ID: "dc1"
  
  # Region identifier (optional, for geo-distributed deployments)
  # Examples: us-east-1, us-west-1, eu-central-1, ap-southeast-1
  DC_REGION: "local"
  
  # Set to "Yes" for the pod that should handle preloading
  # Only one pod per DC should have this set to "Yes"
  # For StatefulSet, you can configure this per-instance using pod-specific ConfigMaps if needed
  IS_PRELOAD_LEADER: "No"
  
  # Additional database connection settings can be added here
  # depending on which database driver is being used
